<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal SPHT</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1c003b;
  font-family: 'Inter', sans-serif;
  color: white;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at bottom, rgba(120,80,255,0.08), #1c003b 70%);
  z-index: -2;
}

/* LAYOUT */
.wrapper {
  display: flex;
  min-height: 100vh;
}

/* TEXTO */
.container {
  padding: 80px;
  max-width: 520px;
  z-index: 2;
}

h1 {
  font-family: 'Heebo', sans-serif;
  font-size: 40px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

p {
  opacity: 0.85;
  line-height: 1.6;
}

/* BOTÃO */
button {
  margin-top: 20px;
  padding: 14px 28px;
  background: transparent;
  border: 1px solid rgba(170,120,255,0.6);
  color: white;
  cursor: pointer;
  letter-spacing: 2px;
}

/* RESULTADO */
#resultado {
  margin-top: 30px;
  opacity: 0;
  transition: 0.8s;
}

.extra {
  font-style: italic;
  margin-top: 10px;
  opacity: 0.7;
  font-size: 14px;
}

/* CONTADOR */
#contadorCupom {
  font-family: 'Heebo';
  font-size: 26px;
  color: #d0aaff;
  margin-top: 10px;
  white-space: nowrap;
}

/* PERSONAGEM DESKTOP */
.personagem {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.personagem img {
  max-width: 100%;
  max-height: 90vh;
  object-fit: contain; /* NÃO CORTA */
  opacity: 0.9;
}

/* MOBILE */
@media (max-width: 768px){

  .wrapper {
    flex-direction: column;
  }

  .personagem {
    order: -1;
    width: 100%;
    padding: 10px;
  }

  .personagem img {
    width: 100%;
    height: auto;
    max-height: 40vh;
    object-fit: contain;
  }

  .container {
    padding: 25px 20px;
    max-width: 100%;
    background: rgba(28,0,59,0.85);
    backdrop-filter: blur(6px);
  }

  h1 {
    font-size: 26px;
  }

  p {
    font-size: 14px;
  }

  button {
    width: 100%;
  }

  #contadorCupom {
    text-align: center;
    font-size: 22px;
  }
}

/* DESKTOP */
@media (min-width: 769px){
  .wrapper {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrapper">

  <div class="container">
    <h1>A CIDADE OBSERVA</h1>
    <p>Arrisque sua sorte. O portal não se abre para todos.</p>

    <button onclick="invocar()">INVOCAR DESCONTO</button>

    <div id="resultado"></div>
  </div>

  <div class="personagem">
    <img src="personagem.jpg" alt="Personagem">
  </div>

</div>

<audio id="som" loop>
<source src="https://www.soundjay.com/ambience/city-traffic-1.mp3">
</audio>

<script>

// SOM
document.body.addEventListener("click", () => {
  const som = document.getElementById("som");
  som.volume = 0.2;
  som.play();
}, { once: true });

// INVOCAR
function invocar(){

  const hoje = new Date().toDateString();
  const resultado = document.getElementById("resultado");

  if(localStorage.getItem("usou")===hoje){
    resultado.style.opacity=1;
    resultado.innerHTML = `
    Você já foi observado hoje.
    <div class="extra">Após 24 horas tente novamente!</div>`;
    return;
  }

  localStorage.setItem("usou",hoje);

  if(Math.random()<0.7){

    const cupom = "SPHT20-" + Math.floor(1000+Math.random()*9000);

    const agora = Date.now();
    const expiraRapido = agora + (2 * 60 * 60 * 1000);
    const expiraTotal = agora + (48 * 60 * 60 * 1000);

    localStorage.setItem("cupom", cupom);
    localStorage.setItem("expiraRapido", expiraRapido);
    localStorage.setItem("expiraTotal", expiraTotal);

    mostrarCupom(cupom);

  } else {

    resultado.style.opacity=1;
    resultado.innerHTML=`
    Nenhum contato com o além!
    <div class="extra">Após 24 horas poderá tentar novamente!</div>`;
  }
}

// MOSTRAR CUPOM
function mostrarCupom(cupom){

  const resultado = document.getElementById("resultado");

  resultado.style.opacity=1;
  resultado.innerHTML=`
  Quem diria... você foi percebido!<br><br>

  <strong>${cupom}</strong>

  <div class="extra">
  ⚠️ Use nas próximas <strong>2 horas</strong>.<br>
  Depois disso, pode desaparecer.<br><br>
  Pode durar até 48h... mas não confie nisso.
  </div>

  <div id="contadorCupom"></div>

  <button onclick="abrirWhats('${cupom}')">ACESSAR AGORA</button>
  `;

  iniciarContadorCupom();
}

// CONTADOR
function iniciarContadorCupom(){

  const el = document.getElementById("contadorCupom");

  function atualizar(){

    const agora = Date.now();
    const expiraRapido = parseInt(localStorage.getItem("expiraRapido"));
    const expiraTotal = parseInt(localStorage.getItem("expiraTotal"));

    if(!expiraRapido || !expiraTotal) return;

    let restante = expiraRapido - agora;

    if(restante > 0){

      const m = Math.floor(restante/60000);
      const s = Math.floor((restante%60000)/1000);

      el.innerHTML = `⏳ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    } else if (agora < expiraTotal){

      el.innerHTML = `⚠️ Instável... pode desaparecer.`;

    } else {

      el.innerHTML = `❌ Portal fechado.`;
      localStorage.removeItem("cupom");
    }
  }

  setInterval(atualizar,1000);
}

// WHATS
function abrirWhats(cupom){
  const msg = encodeURIComponent(
    "Olá! Ganhei o cupom "+cupom+" 👁️"
  );
  window.open("https://wa.me/5511956512412?text="+msg,"_blank");
}

// RECUPERAR
window.onload = function(){

  const cupom = localStorage.getItem("cupom");
  const expiraTotal = localStorage.getItem("expiraTotal");

  if(cupom && expiraTotal && Date.now() < expiraTotal){
    mostrarCupom(cupom);
  }

};

</script>

</body>
</html>
