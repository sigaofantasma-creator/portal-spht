<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal SPHT</title>

<style>

body {
  margin: 0;
  background: black;
  font-family: Georgia, serif;
  color: white;
  overflow: hidden;
}

/* fundo urbano sutil */
.bg-sp {
  position: fixed;
  width: 100%;
  height: 100%;
  bottom: 0;
  background: linear-gradient(to top, rgba(255,255,255,0.04), transparent 60%);
  z-index: -2;
}

/* camada de leitura */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, black 40%, transparent 100%);
  z-index: -1;
}

/* personagem com respiração */
.personagem {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  opacity: 0.8;
  animation: respirar 6s ease-in-out infinite;
}

@keyframes respirar {
  0% { transform: scale(1); }
  50% { transform: scale(1.015); }
  100% { transform: scale(1); }
}

/* conteúdo */
.container {
  padding: 140px 80px;
  max-width: 520px;
}

h1 {
  font-size: 32px;
  letter-spacing: 3px;
  font-weight: normal;
}

p {
  opacity: 0.5;
}

/* botão com micro-interação */
button {
  margin-top: 40px;
  padding: 14px 32px;
  font-size: 14px;
  letter-spacing: 2px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.08);
  letter-spacing: 4px;
  border-color: rgba(255,255,255,0.6);
}

/* resultado */
#resultado {
  margin-top: 50px;
  line-height: 1.8;
  opacity: 0;
  transition: opacity 1s;
}

/* mobile */
@media (max-width: 768px) {

  .personagem {
    height: 70%;
    right: -40px;
    opacity: 0.5;
  }

  .overlay {
    background: linear-gradient(to bottom, black 65%, transparent 100%);
  }

  .container {
    padding: 80px 30px;
    max-width: 100%;
  }

  h1 {
    font-size: 24px;
  }

  button {
    width: 100%;
  }

}

</style>
</head>

<body>

<div class="bg-sp"></div>
<div class="overlay"></div>

<img src="personagem.jpg" class="personagem">

<div class="container">
  <h1>👁️ A CIDADE OBSERVA</h1>
  <p id="subtexto">Nem tudo em São Paulo pode ser visto.</p>

  <button onclick="invocar()">INVOCAR</button>

  <div id="resultado"></div>
</div>

<script>

function invocar() {

  const hoje = new Date().toDateString();
  const resultado = document.getElementById("resultado");
  const subtexto = document.getElementById("subtexto");

  let nivel = parseInt(localStorage.getItem("nivel") || "0");

  if (localStorage.getItem("usou") === hoje) {
    resultado.style.opacity = 1;
    resultado.innerHTML = "Você já foi observado hoje.";
    return;
  }

  localStorage.setItem("usou", hoje);

  const chance = Math.random();

  if (chance < 0.6) {

    const cupom = "SPHT20-" + Math.floor(1000 + Math.random() * 9000);
    let tempo = 300;

    nivel++;
    localStorage.setItem("nivel", nivel);

    // storytelling progressivo
    const narrativas = [
      "Você foi percebido.",
      "Algo começou a responder.",
      "Você está atravessando camadas.",
      "A cidade começa a se revelar.",
      "Agora você já não é um estranho."
    ];

    const msg = narrativas[Math.min(nivel-1, narrativas.length-1)];

    subtexto.innerText = msg;

    resultado.style.opacity = 1;
    resultado.innerHTML =
      `${msg}<br><br>
       <strong>${cupom}</strong><br><br>
       expira em <span id="tempo">${tempo}</span>s`;

    const timer = setInterval(() => {
      tempo--;
      document.getElementById("tempo").innerText = tempo;

      if (tempo <= 0) {
        clearInterval(timer);
        resultado.innerHTML = "O acesso foi encerrado.";
      }
    }, 1000);

  } else {

    const erros = [
      "Nada respondeu.",
      "A cidade permaneceu em silêncio.",
      "Você ainda não está pronto.",
      "O acesso não foi concedido."
    ];

    const msgErro = erros[Math.floor(Math.random() * erros.length)];

    resultado.style.opacity = 1;
    resultado.innerHTML = msgErro;

  }

}

</script>

</body>
</html>
