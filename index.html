<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Portal SPHT</title>

<style>

body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* SILHUETA SÃO PAULO (marca d'água) */
.bg-sp {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://upload.wikimedia.org/wikipedia/commons/6/6d/Sao_Paulo_skyline_silhouette.png') no-repeat center bottom;
  background-size: contain;
  opacity: 0.05;
  z-index: -2;
}

/* PERSONAGEM */
.personagem {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  opacity: 0.9;
}

/* CONTEÚDO */
.container {
  position: relative;
  z-index: 2;
  padding: 120px 60px;
  max-width: 500px;
}

/* TÍTULO */
h1 {
  font-size: 34px;
  letter-spacing: 2px;
  animation: glitch 1.5s infinite;
}

/* TEXTO */
p {
  opacity: 0.6;
}

/* BOTÃO */
button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 25px rgba(255,255,255,0.4);
}

/* RESULTADO */
#resultado {
  margin-top: 40px;
  line-height: 1.6;
}

/* GLITCH */
@keyframes glitch {
  0% {text-shadow: 2px 2px red;}
  20% {text-shadow: -2px -2px blue;}
  40% {text-shadow: 2px -2px purple;}
  60% {text-shadow: -2px 2px cyan;}
  80% {text-shadow: 1px 1px white;}
  100% {text-shadow: none;}
}

</style>
</head>

<body>

<div class="bg-sp"></div>

<img src="personagem.jpg" class="personagem">

<div class="container">
  <h1>👁️ A CIDADE OBSERVA</h1>
  <p>Nem todos recebem uma resposta.</p>

  <button onclick="invocar()">Invocar</button>

  <div id="resultado"></div>
</div>

<script>

function invocar() {

  const hoje = new Date().toDateString();

  if (localStorage.getItem("usou") === hoje) {
    document.getElementById("resultado").innerHTML =
      "💀 Você já atravessou hoje.";
    return;
  }

  localStorage.setItem("usou", hoje);

  const chance = Math.random();

  if (chance < 0.6) {

    const cupom = "SPHT20-" + Math.floor(1000 + Math.random() * 9000);
    let tempo = 300;

    const mensagens = [
      "👁️ Ela te viu.",
      "🕯️ Algo em você chamou.",
      "🏙️ A cidade respondeu.",
      "🔮 Você acessou o que não deveria.",
      "⚠️ Isso é raro."
    ];

    const msg = mensagens[Math.floor(Math.random() * mensagens.length)];

    document.getElementById("resultado").innerHTML =
      `${msg}<br><br>
       Código revelado:<br><br>
       <strong>${cupom}</strong><br><br>
       ⏳ Some em <span id="tempo">${tempo}</span>s`;

    const timer = setInterval(() => {
      tempo--;
      document.getElementById("tempo").innerText = tempo;

      if (tempo <= 0) {
        clearInterval(timer);
        document.getElementById("resultado").innerHTML =
          "💀 Desapareceu.";
      }
    }, 1000);

  } else {

    const erros = [
      "🌫️ Nada respondeu.",
      "💀 Não hoje.",
      "👁️ Você foi observado... mas ignorado.",
      "🔒 A cidade negou.",
      "🕳️ Algo bloqueou."
    ];

    const msgErro = erros[Math.floor(Math.random() * erros.length)];

    document.getElementById("resultado").innerHTML = msgErro;

  }

}

</script>

</body>
</html>
