<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal SPHT</title>

<!-- FONTES -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: black;
  font-family: 'Inter', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* FUNDO URBANO */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at bottom, rgba(120,80,255,0.08), black 70%);
  z-index: -3;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, black 55%, rgba(0,0,0,0.2));
  z-index: -2;
}

/* PERSONAGEM */
.personagem {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  opacity: 0.9;
  animation: respirar 7s ease-in-out infinite;
}

@keyframes respirar {
  0% { transform: scale(1); }
  50% { transform: scale(1.01); }
  100% { transform: scale(1); }
}

/* OLHO */
.olho {
  position: absolute;
  width: 14px;
  height: 14px;
  background: rgba(170,120,255,0.9);
  border-radius: 50%;
  top: 38%;
  right: 16%;
  box-shadow: 0 0 10px rgba(170,120,255,0.7);
  transition: transform 0.2s;
}

/* CONTEÚDO */
.container {
  padding: 140px 80px;
  max-width: 520px;
}

/* TÍTULO URBANO */
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  letter-spacing: 6px;
}

/* TEXTO */
p {
  font-family: 'Inter', sans-serif;
  opacity: 0.8;
  line-height: 1.6;
}

/* BOTÃO VIOLETA VIVO */
button {
  margin-top: 40px;
  padding: 14px 32px;
  background: transparent;
  border: 1px solid rgba(170,120,255,0.6);
  color: white;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 2px;
  transition: all 0.3s ease;
  animation: pulso 3s infinite;
}

@keyframes pulso {
  0% { box-shadow: 0 0 0 rgba(170,120,255,0); }
  50% { box-shadow: 0 0 20px rgba(170,120,255,0.3); }
  100% { box-shadow: 0 0 0 rgba(170,120,255,0); }
}

button:hover {
  transform: scale(1.08);
  letter-spacing: 3px;
  border-color: rgba(200,170,255,1);
}

/* RESULTADO */
#resultado {
  margin-top: 50px;
  opacity: 0;
  transition: 1s;
}

.extra {
  font-style: italic;
  margin-top: 15px;
  opacity: 0.7;
  font-size: 14px;
}

/* MOBILE PERFEITO */
@media (max-width:768px){

.personagem {
  position: relative;
  width: 100%;
  height: auto;
  opacity: 1;
}

.container {
  padding: 30px 20px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
}

h1 {
  font-size: 32px;
}

button {
  width: 100%;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<img src="personagem.jpg" class="personagem">
<div class="olho" id="olho"></div>

<div class="container">

<h1>A CIDADE OBSERVA</h1>

<p>
Nem tudo em São Paulo pode ser conquistado. Arrisque sua sorte. Mentalize. Toque no botão do portal. Quem sabe um fantasma te permita ultrapassar.
</p>

<button onclick="invocar()">INVOCAR DESCONTO</button>

<div id="resultado"></div>

</div>

<!-- SOM -->
<audio id="som" loop>
<source src="https://www.soundjay.com/ambience/city-traffic-1.mp3" type="audio/mpeg">
</audio>

<script>

// SOM
document.body.addEventListener("click", () => {
  const som = document.getElementById("som");
  som.volume = 0.2;
  som.play();
}, { once: true });

// OLHO SEGUE
document.addEventListener("mousemove", (e) => {
  const olho = document.getElementById("olho");
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;
  olho.style.transform = `translate(${x}px, ${y}px)`;
});

// TOUCH
document.addEventListener("touchmove", (e) => {
  const t = e.touches[0];
  const olho = document.getElementById("olho");
  const x = (t.clientX / window.innerWidth - 0.5) * 10;
  const y = (t.clientY / window.innerHeight - 0.5) * 10;
  olho.style.transform = `translate(${x}px, ${y}px)`;
});

// FUNÇÃO
function invocar(){

const hoje = new Date().toDateString();
const resultado = document.getElementById("resultado");

if(localStorage.getItem("usou")===hoje){
  resultado.style.opacity=1;
  resultado.innerHTML="Você já foi observado hoje.";
  return;
}

localStorage.setItem("usou",hoje);

if(Math.random()<0.6){

  const cupom = "SPHT20-" + Math.floor(1000+Math.random()*9000);

  resultado.style.opacity=1;
  resultado.innerHTML=
  `Você foi percebido.<br><br>
  <strong>${cupom}</strong>

  <div class="extra">
  chame agora no whats de reservas 11 95651 2412! Você ganhou 20% de desconto na compra de seu ingresso - e de todos os seus acompanhantes - com pagamento via PIX, diretamente na agência. Este cupom NÃO é válido para compras efetuadas na Sympla.
  </div>

  <br>
  <button onclick="abrirWhats('${cupom}')">CHAMAR NO WHATSAPP</button>
  `;

}else{

  resultado.style.opacity=1;
  resultado.innerHTML=
  `Nada respondeu.
  <div class="extra">
  Dentro de 24 horas poderá tentar novamente!
  </div>`;

}

}

function abrirWhats(cupom){
  const msg = encodeURIComponent(
    "Olá! Fui contemplado no portal com o cupom "+cupom+" 👁️"
  );
  window.open("https://wa.me/5511956512412?text="+msg,"_blank");
}

</script>

</body>
</html>
