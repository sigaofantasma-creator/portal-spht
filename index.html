<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal SPHT</title>

<style>

body {
  margin: 0;
  background: black;
  font-family: Georgia, serif;
  color: white;
}

/* fundo */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(255,255,255,0.05), transparent);
  z-index: -3;
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, black 55%, rgba(0,0,0,0.2));
  z-index: -2;
}

/* personagem */
.personagem {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  opacity: 0.85;
  animation: respirar 7s ease-in-out infinite;
}

@keyframes respirar {
  0% { transform: scale(1); }
  50% { transform: scale(1.01); }
  100% { transform: scale(1); }
}

/* olho */
.olho {
  position: absolute;
  width: 12px;
  height: 12px;
  background: rgba(160,120,255,0.9);
  border-radius: 50%;
  top: 38%;
  right: 16%;
  animation: olhar 6s infinite;
}

@keyframes olhar {
  0% { transform: translate(0,0); }
  50% { transform: translate(-2px,1px); }
  100% { transform: translate(0,0); }
}

/* conteúdo */
.container {
  padding: 140px 80px;
  max-width: 520px;
}

h1 {
  letter-spacing: 3px;
}

p {
  opacity: 0.75;
}

/* BOTÃO COM BORDA VIOLETA */
button {
  margin-top: 40px;
  padding: 14px 32px;
  background: transparent;
  border: 1px solid rgba(160,120,255,0.6);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.07);
  letter-spacing: 3px;
  border-color: rgba(200,170,255,1);
  box-shadow: 0 0 12px rgba(160,120,255,0.4);
}

/* resultado */
#resultado {
  margin-top: 50px;
  opacity: 0;
  transition: 1s;
}

/* texto extra */
.extra {
  font-style: italic;
  margin-top: 15px;
  opacity: 0.7;
  font-size: 14px;
}

/* mobile */
@media (max-width:768px){

.personagem {
  position: relative;
  width: 100%;
  height: auto;
  opacity: 1;
}

.container {
  padding: 30px 20px;
  background: rgba(0,0,0,0.8);
}

button {
  width: 100%;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<img src="personagem.jpg" class="personagem">
<div class="olho"></div>

<div class="container">
<h1>👁️ A CIDADE OBSERVA</h1>

<p>
Nem tudo em São Paulo pode ser conquistado. Arrisque sua sorte. Mentalize. Toque no botão do portal. Quem sabe um fantasma te permita ultrapassar.
</p>

<button onclick="invocar()">INVOCAR DESCONTO</button>

<div id="resultado"></div>

</div>

<!-- som ambiente -->
<audio id="som" loop>
<source src="https://www.soundjay.com/ambience/city-traffic-1.mp3" type="audio/mpeg">
</audio>

<script>

// som inicia no primeiro clique
document.body.addEventListener("click", () => {
  const som = document.getElementById("som");
  som.volume = 0.2;
  som.play();
}, { once: true });

function invocar(){

const hoje = new Date().toDateString();
const resultado = document.getElementById("resultado");

if(localStorage.getItem("usou")===hoje){
  resultado.style.opacity=1;
  resultado.innerHTML="Você já foi observado hoje.";
  return;
}

localStorage.setItem("usou",hoje);

const chance = Math.random();

if(chance<0.6){

  const cupom = "SPHT20-" + Math.floor(1000+Math.random()*9000);

  resultado.style.opacity=1;
  resultado.innerHTML=
  `Você foi percebido.<br><br>
  <strong>${cupom}</strong>

  <div class="extra">
  chame agora no whats de reservas 11 95651 2412! Você ganhou 20% de desconto na compra de seu ingresso - e de todos os seus acompanhantes - com pagamento via PIX, diretamente na agência. Este cupom NÃO é válido para compras efetuadas na Sympla.
  </div>

  <br>
  <button onclick="abrirWhats('${cupom}')">CHAMAR NO WHATSAPP</button>
  `;

}else{

  resultado.style.opacity=1;
  resultado.innerHTML=
  `Nada respondeu.
  <div class="extra">
  Dentro de 24 horas poderá tentar novamente!
  </div>`;

}

}

function abrirWhats(cupom){
  const msg = encodeURIComponent(
    "Olá! Fui contemplado no portal com o cupom "+cupom+" 👁️"
  );
  window.open("https://wa.me/5511956512412?text="+msg,"_blank");
}

</script>

</body>
</html>
