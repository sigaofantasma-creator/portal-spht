<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal SPHT</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #1c003b;
  font-family: 'Inter', sans-serif;
  color: white;
  overflow-x: hidden;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at bottom, rgba(120,80,255,0.08), #1c003b 70%);
  z-index: -3;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, #1c003b 55%, rgba(0,0,0,0.2));
  z-index: -2;
}

.personagem {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  opacity: 0.9;
}

.container {
  padding: 140px 80px;
  max-width: 520px;
}

h1 {
  font-family: 'Heebo', sans-serif;
  font-size: 40px;
  letter-spacing: 2px;
}

p {
  opacity: 0.8;
}

button {
  margin-top: 20px;
  padding: 12px 28px;
  background: transparent;
  border: 1px solid rgba(170,120,255,0.6);
  color: white;
  cursor: pointer;
}

#resultado {
  margin-top: 30px;
  opacity: 0;
  transition: 1s;
}

.extra {
  font-style: italic;
  margin-top: 10px;
  opacity: 0.7;
}

#contadorCupom {
  font-size: 26px;
  color: #d0aaff;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<img src="personagem.jpg" class="personagem">

<div class="container">
<h1>A CIDADE OBSERVA</h1>
<p>Arrisque sua sorte. O portal não se abre para todos.</p>

<button onclick="invocar()">INVOCAR DESCONTO</button>

<div id="resultado"></div>
</div>

<audio id="som" loop>
<source src="https://www.soundjay.com/ambience/city-traffic-1.mp3" type="audio/mpeg">
</audio>

<script>

// SOM
document.body.addEventListener("click", () => {
  const som = document.getElementById("som");
  som.volume = 0.2;
  som.play();
}, { once: true });

// INVOCAR
function invocar(){

  const hoje = new Date().toDateString();
  const resultado = document.getElementById("resultado");

  if(localStorage.getItem("usou")===hoje){
    resultado.style.opacity=1;
    resultado.innerHTML = `
    Você já foi observado hoje.
    <div class="extra">
    Dentro de 24 horas tente novamente!
    </div>`;
    return;
  }

  localStorage.setItem("usou",hoje);

  // 🔥 60% DE CHANCE
  if(Math.random()<0.6){

    const cupom = "SPHT20-" + Math.floor(1000+Math.random()*9000);

    const agora = Date.now();
    const expiraRapido = agora + (2 * 60 * 60 * 1000);
    const expiraTotal = agora + (48 * 60 * 60 * 1000);

    localStorage.setItem("cupom", cupom);
    localStorage.setItem("expiraRapido", expiraRapido);
    localStorage.setItem("expiraTotal", expiraTotal);

    mostrarCupom(cupom);

  } else {

    resultado.style.opacity=1;
    resultado.innerHTML=`
    Nenhum contato com o além!
    <div class="extra">
    Após 24 horas poderá tentar novamente!
    </div>`;
  }
}

// MOSTRAR CUPOM
function mostrarCupom(cupom){

  const resultado = document.getElementById("resultado");

  resultado.style.opacity=1;
  resultado.innerHTML=`
  Quem diria... você foi percebido.<br><br>

  <strong>${cupom}</strong>

  <div class="extra">
  O portal abriu uma passagem rara.<br><br>

  ⚠️ Use este código nas próximas <strong>2 horas</strong> para garantir o desconto.<br>
  Depois disso, ele pode desaparecer sem aviso.<br><br>

  Se ainda estiver ativo, poderá funcionar por até 48 horas...<br>
  mas o portal nem sempre é generoso duas vezes.
  </div>

  <br>
  <div id="contadorCupom"></div>
  <br>

  <button onclick="abrirWhats('${cupom}')">ACESSAR AGORA</button>
  `;

  iniciarContadorCupom();
}

// CONTADOR
function iniciarContadorCupom(){

  const el = document.getElementById("contadorCupom");

  function atualizar(){

    const agora = Date.now();
    const expiraRapido = parseInt(localStorage.getItem("expiraRapido"));
    const expiraTotal = parseInt(localStorage.getItem("expiraTotal"));

    if(!expiraRapido || !expiraTotal) return;

    let restante = expiraRapido - agora;

    if(restante > 0){

      const m = Math.floor(restante/60000);
      const s = Math.floor((restante%60000)/1000);

      el.innerHTML = `⏳ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    } else if (agora < expiraTotal){

      el.innerHTML = `⚠️ O portal está instável... o cupom pode desaparecer.`;

    } else {

      el.innerHTML = `❌ O portal se fechou.`;
      localStorage.removeItem("cupom");
    }
  }

  setInterval(atualizar,1000);
}

// WHATS
function abrirWhats(cupom){
  const msg = encodeURIComponent(
    "Olá! Fui contemplado no portal com o cupom "+cupom+" 👁️"
  );
  window.open("https://wa.me/5511956512412?text="+msg,"_blank");
}

// RECUPERAR SE VOLTAR
window.onload = function(){

  const cupom = localStorage.getItem("cupom");
  const expiraTotal = localStorage.getItem("expiraTotal");

  if(cupom && expiraTotal && Date.now() < expiraTotal){
    mostrarCupom(cupom);
  }

};

</script>

</body>
</html>
