<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal SPHT</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  font-family: 'Inter', sans-serif;
  color: white;
  overflow-x: hidden;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at bottom, rgba(120,80,255,0.08), black 70%);
  z-index: -3;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, black 55%, rgba(0,0,0,0.2));
  z-index: -2;
}

.personagem {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  opacity: 0.9;
  animation: respirar 7s ease-in-out infinite;
}

@keyframes respirar {
  0% { transform: scale(1); }
  50% { transform: scale(1.01); }
  100% { transform: scale(1); }
}

.container {
  padding: 140px 80px;
  max-width: 520px;
}

h1 {
  font-family: 'Heebo', sans-serif;
  font-size: 40px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

p {
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  opacity: 0.8;
  line-height: 1.6;
}

#contador, #contadorFechado {
  font-family: 'Heebo', sans-serif;
  font-size: 28px;
  margin: 20px 0;
  letter-spacing: 2px;
  color: #d0aaff;
  transition: all 0.2s ease-in-out;
}

.glitch {
  color: #ff77ff;
  text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
  animation: glitchAnim 0.3s infinite;
}

@keyframes glitchAnim {
  0% { transform: translate(0,0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(2px,-2px); }
  60% { transform: translate(-1px,1px); }
  80% { transform: translate(1px,-1px); }
  100% { transform: translate(0,0); }
}

button {
  margin-top: 30px;
  padding: 12px 28px;
  background: transparent;
  border: 1px solid rgba(170,120,255,0.6);
  color: white;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 2px;
  transition: all 0.3s ease;
  animation: pulso 3s infinite;
}

@keyframes pulso {
  0% { box-shadow: 0 0 0 rgba(170,120,255,0); }
  50% { box-shadow: 0 0 20px rgba(170,120,255,0.3); }
 100% { box-shadow: 0 0 0 rgba(170,120,255,0); }
}

button:hover {
  transform: scale(1.08);
  letter-spacing: 3px;
  border-color: rgba(200,170,255,1);
}

#resultado {
  margin-top: 40px;
  opacity: 0;
  transition: 1s;
}

.extra {
  font-style: italic;
  margin-top: 10px;
  opacity: 0.7;
  font-size: 14px;
}

@media (max-width:768px){
  .personagem {
    position: relative;
    width: 100%;
    height: auto;
    opacity: 1;
  }

  .container {
    padding: 30px 20px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
  }

  h1 {
    font-size: 28px;
  }

  button {
    width: 100%;
  }

  #contador, #contadorFechado {
    font-size: 22px;
  }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<img src="personagem.jpg" class="personagem">

<div class="container" id="portalAberto">
<h1>A CIDADE OBSERVA</h1>
<p>Nem tudo em São Paulo pode ser conquistado. Arrisque sua sorte. Mentalize. Toque no botão do portal. Quem sabe o fantasma perceba e te permita ultrapassar.</p>
<div id="contador"></div>
<button onclick="invocar()">INVOCAR DESCONTO</button>
<div id="resultado"></div>
</div>

<div class="container" id="portalFechado" style="display:none; text-align:center; padding-top:200px;">
<h1>O PORTAL AINDA NÃO ABRIU</h1>
<p>Volte em breve para tentar atravessar o portal e conquistar seu destino!</p>
<div id="contadorFechado"></div>
</div>

<audio id="som" loop>
<source src="https://www.soundjay.com/ambience/city-traffic-1.mp3" type="audio/mpeg">
</audio>

<script>
// SOM
document.body.addEventListener("click", () => {
  const som = document.getElementById("som");
  som.volume = 0.2;
  som.play();
}, { once: true });

// TEMPO FIXO DE CICLO
const cicloAberto = 5*60; // 5 minutos aberto
const cicloFechado = 5*60; // 5 minutos fechado
const cicloTotal = cicloAberto + cicloFechado;

// ELEMENTOS
const contador = document.getElementById("contador");
const contadorFechado = document.getElementById("contadorFechado");
const portalAbertoDiv = document.getElementById("portalAberto");
const portalFechadoDiv = document.getElementById("portalFechado");

// FUNÇÃO PARA FORMATAR TEMPO
function formatarTempo(segundos){
  const m = Math.floor(segundos/60).toString().padStart(2,'0');
  const s = (segundos%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

// ATUALIZA PORTAL E CONTADOR
function atualizarPortal(){
  const agora = Date.now();
  // Tempo absoluto baseado em epoch em segundos
  const segundosTotais = Math.floor(agora/1000);
  const cicloAtual = segundosTotais % cicloTotal;
  const aberto = cicloAtual < cicloAberto;
  const restante = aberto ? cicloAberto - cicloAtual : cicloTotal - cicloAtual;

  portalAbertoDiv.style.display = aberto ? "block" : "none";
  portalFechadoDiv.style.display = aberto ? "none" : "block";

  const cont = aberto ? contador : contadorFechado;
  cont.innerText = formatarTempo(restante);

  if(restante <= 10){
    cont.classList.add("glitch");
  } else {
    cont.classList.remove("glitch");
  }
}

// ATUALIZA A CADA SEGUNDO
setInterval(atualizarPortal,1000);

// FUNÇÃO INVOCAR DESCONTO
function invocar(){
const hoje = new Date().toDateString();
const resultado = document.getElementById("resultado");

if(localStorage.getItem("usou")===hoje){
  resultado.style.opacity=1;
  resultado.innerHTML = `
  Você já foi observado hoje.
  <div class="extra">
  Dentro de 24 horas tente novamente!
  </div>
  `;
  return;
}

localStorage.setItem("usou",hoje);

if(Math.random()<0.3){ // 30% chance de sucesso inicial
  const cupom = "SPHT20-" + Math.floor(1000+Math.random()*9000);

  resultado.style.opacity=1;
  resultado.innerHTML=`
  Quem diria! Você foi percebido!<br><br>
  <strong>${cupom}</strong>
  <div class="extra">
  Chame agora no WhatsApp 11 95651 2412! Você ganhou 20% de desconto na compra de seu ingresso - diretamente na agência. Este cupom NÃO é válido para compras efetuadas na Sympla.
  </div>
  <br>
  <button onclick="abrirWhats('${cupom}')">CHAMAR NO WHATSAPP</button>
  `;
}else{
  resultado.style.opacity=1;
  resultado.innerHTML=`
  Nenhum contato com o além!
  <div class="extra">
  Dentro de 24 horas poderá tentar novamente!
  </div>`;
}
}

function abrirWhats(cupom){
  const msg = encodeURIComponent(
    "Olá! Fui contemplado no portal com o cupom "+cupom+" 👁️"
  );
  window.open("https://wa.me/5511956512412?text="+msg,"_blank");
}

</script>

</body>
</html>
