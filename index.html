<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal SPHT</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      background: transparent;
      border: 1px solid white;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: white;
      color: black;
    }

    #resultado {
      margin-top: 40px;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <h1>👁️ Portal SPHT</h1>
  <p>Apenas alguns conseguem atravessar...</p>

  <button onclick="invocar()">Invocar desconto</button>

  <div id="resultado"></div>

  <script>

    function invocar() {

      const hoje = new Date().toDateString();

      // 1 tentativa por dia
      if (localStorage.getItem("usou") === hoje) {
        document.getElementById("resultado").innerHTML =
          "💀 Você já atravessou o portal hoje.";
        return;
      }

      localStorage.setItem("usou", hoje);

      const chance = Math.random();

      // 60% de chance
      if (chance < 0.6) {

        const cupom = "SPHT20-" + Math.floor(1000 + Math.random() * 9000);
        let tempo = 300;

        document.getElementById("resultado").innerHTML =
          `👁️ Você foi escolhido...<br><br>
           O portal revelou um fragmento escondido.<br><br>
           <strong>${cupom}</strong><br>
           <br>⏳ Este código desaparecerá em <span id="tempo">${tempo}</span>s`;

        const timer = setInterval(() => {
          tempo--;
          document.getElementById("tempo").innerText = tempo;

          if (tempo <= 0) {
            clearInterval(timer);
            document.getElementById("resultado").innerHTML =
              "💀 O portal se fechou. O fragmento foi perdido.";
          }
        }, 1000);

      } else {

        document.getElementById("resultado").innerHTML =
          "🌫️ O portal te rejeitou hoje... volte amanhã.";

      }

    }

  </script>

</body>
</html>
