<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal SPHT</title>

<style>

body {
  margin: 0;
  background: black;
  font-family: Georgia, serif;
  color: white;
}

/* fundo urbano */
.bg-sp {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(255,255,255,0.05), transparent 70%);
  z-index: -3;
}

/* overlay leitura */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, black 50%, rgba(0,0,0,0.2) 100%);
  z-index: -2;
}

/* personagem */
.personagem {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  opacity: 0.85;
  animation: respirar 7s ease-in-out infinite;
}

/* respiração */
@keyframes respirar {
  0% { transform: scale(1); }
  50% { transform: scale(1.01); }
  100% { transform: scale(1); }
}

/* olho */
.olho {
  position: absolute;
  width: 14px;
  height: 14px;
  background: rgba(150,100,255,0.8);
  border-radius: 50%;
  top: 38%;
  right: 16%;
  animation: olhar 6s infinite;
}

@keyframes olhar {
  0% { transform: translate(0,0); }
  25% { transform: translate(-2px,1px); }
  50% { transform: translate(1px,-1px); }
  75% { transform: translate(-1px,0); }
  100% { transform: translate(0,0); }
}

/* conteúdo */
.container {
  position: relative;
  z-index: 2;
  padding: 140px 80px;
  max-width: 520px;
}

h1 {
  font-size: 32px;
  letter-spacing: 3px;
}

p {
  opacity: 0.75;
  line-height: 1.6;
}

/* botão */
button {
  margin-top: 40px;
  padding: 14px 32px;
  font-size: 14px;
  letter-spacing: 2px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.07);
  letter-spacing: 4px;
  border-color: rgba(255,255,255,0.6);
}

/* resultado */
#resultado {
  margin-top: 50px;
  line-height: 1.8;
  opacity: 0;
  transition: opacity 1s;
}

/* texto adicional */
.extra {
  margin-top: 15px;
  font-style: italic;
  opacity: 0.7;
  font-size: 14px;
}

/* MOBILE */
@media (max-width: 768px) {

  .personagem {
    position: relative;
    width: 100%;
    height: auto;
    opacity: 1;
  }

  .overlay {
    background: linear-gradient(to bottom, black 65%, rgba(0,0,0,0.3) 100%);
  }

  .container {
    padding: 30px 20px;
    margin-top: -40px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
  }

  h1 {
    font-size: 22px;
  }

  button {
    width: 100%;
  }

}

</style>
</head>

<body>

<div class="bg-sp"></div>
<div class="overlay"></div>

<img src="personagem.jpg" class="personagem">
<div class="olho"></div>

<div class="container">
  <h1>👁️ A CIDADE OBSERVA</h1>

  <p id="subtexto">
    Nem tudo em São Paulo pode ser conquistado. Arrisque sua sorte. Mentalize. Toque no botão do portal. Quem sabe o fantasma perceba sua presença e te permita ultrapassar.
  </p>

  <button onclick="invocar()">INVOCAR DESCONTO</button>

  <div id="resultado"></div>
</div>

<script>

function invocar() {

  const hoje = new Date().toDateString();
  const resultado = document.getElementById("resultado");

  if (localStorage.getItem("usou") === hoje) {
    resultado.style.opacity = 1;
    resultado.innerHTML = "Você já foi observado hoje.";
    return;
  }

  localStorage.setItem("usou", hoje);

  const chance = Math.random();

  if (chance < 0.6) {

    const cupom = "SPHT20-" + Math.floor(1000 + Math.random() * 9000);

    resultado.style.opacity = 1;
    resultado.innerHTML =
      `Você foi percebido.<br><br>
       <strong>${cupom}</strong>
       <div class="extra">
       chame agora no whats de reservas 11 95651 2412 e informe o código! Você ganhou 20% de desconto na compra de seu ingresso - e de todos os seus acompanhantes - com pagamento via PIX, diretamente na agência. Este cupom de desconto NÃO É VALIDO para compras efetuadas na Sympla.
       </div>`;

  } else {

    resultado.style.opacity = 1;
    resultado.innerHTML =
      `Nada respondeu.
       <div class="extra">
       Dentro de 24 horas poderá tentar novamente!
       </div>`;

  }

}

</script>

</body>
</html>
