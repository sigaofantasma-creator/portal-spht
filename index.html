<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal SPHT</title>

<style>

body {
  margin: 0;
  background: black;
  font-family: Georgia, serif;
  color: white;
  overflow: hidden;
}

/* BASE URBANA (simula cidade) */
.bg-sp {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(255,255,255,0.05), transparent 70%);
  z-index: -3;
}

/* OVERLAY DE LEITURA (ESSENCIAL) */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, black 50%, rgba(0,0,0,0.2) 100%);
  z-index: -2;
}

/* PERSONAGEM */
.personagem {
  position: fixed;
  right: 0;
  bottom: 0;
  height: 100%;
  opacity: 0.85;
  animation: respirar 7s ease-in-out infinite;
}

/* RESPIRAÇÃO */
@keyframes respirar {
  0% { transform: scale(1); }
  50% { transform: scale(1.01); }
  100% { transform: scale(1); }
}

/* OLHO (movimento sutil) */
.olho {
  position: absolute;
  width: 14px;
  height: 14px;
  background: rgba(150,100,255,0.8);
  border-radius: 50%;
  top: 38%;
  right: 16%;
  animation: olhar 6s infinite;
  filter: blur(0.5px);
}

@keyframes olhar {
  0% { transform: translate(0,0); }
  25% { transform: translate(-2px,1px); }
  50% { transform: translate(1px,-1px); }
  75% { transform: translate(-1px,0); }
  100% { transform: translate(0,0); }
}

/* CONTEÚDO */
.container {
  position: relative;
  z-index: 2;
  padding: 140px 80px;
  max-width: 520px;
}

h1 {
  font-size: 32px;
  letter-spacing: 3px;
}

p {
  opacity: 0.6;
}

/* BOTÃO PREMIUM */
button {
  margin-top: 40px;
  padding: 14px 32px;
  font-size: 14px;
  letter-spacing: 2px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.07);
  letter-spacing: 4px;
  border-color: rgba(255,255,255,0.6);
}

/* RESULTADO */
#resultado {
  margin-top: 50px;
  line-height: 1.8;
  opacity: 0;
  transition: opacity 1s;
}

/* MOBILE PERFEITO */
@media (max-width: 768px) {

  body {
    overflow: auto;
  }

  .personagem {
    position: relative;
    width: 100%;
    height: auto;
    opacity: 0.25;
  }

  .overlay {
    background: linear-gradient(to bottom, black 60%, rgba(0,0,0,0.3) 100%);
  }

  .container {
    padding: 40px 20px;
    margin-top: -120px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  h1 {
    font-size: 22px;
  }

  button {
    width: 100%;
  }

}

</style>
</head>

<body>

<div class="bg-sp"></div>
<div class="overlay"></div>

<img src="personagem.jpg" class="personagem">

<div class="olho"></div>

<div class="container">
  <h1>👁️ A CIDADE OBSERVA</h1>
  <p id="subtexto">Nem tudo em São Paulo pode ser visto.</p>

  <button onclick="invocar()">INVOCAR</button>

  <div id="resultado"></div>
</div>

<script>

function invocar() {

  const hoje = new Date().toDateString();
  const resultado = document.getElementById("resultado");
  const subtexto = document.getElementById("subtexto");

  let nivel = parseInt(localStorage.getItem("nivel") || "0");

  if (localStorage.getItem("usou") === hoje) {
    resultado.style.opacity = 1;
    resultado.innerHTML = "Você já foi observado hoje.";
    return;
  }

  localStorage.setItem("usou", hoje);

  const chance = Math.random();

  if (chance < 0.6) {

    const cupom = "SPHT20-" + Math.floor(1000 + Math.random() * 9000);
    let tempo = 300;

    nivel++;
    localStorage.setItem("nivel", nivel);

    const narrativas = [
      "Você foi percebido.",
      "Algo começou a responder.",
      "Você atravessou mais fundo.",
      "A cidade começa a te reconhecer.",
      "Agora você faz parte disso."
    ];

    const msg = narrativas[Math.min(nivel-1, narrativas.length-1)];

    subtexto.innerText = msg;

    resultado.style.opacity = 1;
    resultado.innerHTML =
      `${msg}<br><br>
       <strong>${cupom}</strong><br><br>
       expira em <span id="tempo">${tempo}</span>s`;

    const timer = setInterval(() => {
      tempo--;
      document.getElementById("tempo").innerText = tempo;

      if (tempo <= 0) {
        clearInterval(timer);
        resultado.innerHTML = "O acesso foi encerrado.";
      }
    }, 1000);

  } else {

    const erros = [
      "Nada respondeu.",
      "A cidade permaneceu em silêncio.",
      "Você ainda não está pronto.",
      "O acesso não foi concedido."
    ];

    const msgErro = erros[Math.floor(Math.random() * erros.length)];

    resultado.style.opacity = 1;
    resultado.innerHTML = msgErro;

  }

}

</script>

</body>
</html>
