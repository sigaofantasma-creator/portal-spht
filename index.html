<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPHT Portal</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* container central */
.container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

/* botão portal */
.portal-btn {
  margin-top: 20px;
  padding: 15px 25px;
  background: transparent;
  border: 1px solid white;
  color: white;
  cursor: pointer;
  font-size: 16px;
  opacity: 0;
  transition: opacity 1s;
}

/* contador */
.timer {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.7;
}

/* glitch */
.glitch {
  animation: glitch 0.3s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(2px, -2px); }
  60% { transform: translate(-1px, 1px); }
  80% { transform: translate(1px, -1px); }
  100% { transform: translate(0); }
}

/* imagem fundo */
.bg-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.25;
}
</style>
</head>

<body>

<img src="SUA_IMAGEM_CANVA.jpg" class="bg-img">

<div class="container">
  <div id="mensagem">Verificando sua presença...</div>
  <div id="timer" class="timer"></div>
  <button id="btn" class="portal-btn" onclick="entrar()">Entrar no Portal</button>
</div>

<script>
const ciclo = 10 * 60 * 1000; // 10 min total (5 aberto / 5 fechado)

function atualizar() {
  const agora = new Date().getTime();
  const fase = agora % ciclo;

  const aberto = fase < ciclo / 2;
  const restante = aberto ? (ciclo/2 - fase) : (ciclo - fase);

  const segundos = Math.floor((restante / 1000) % 60);
  const minutos = Math.floor((restante / 1000) / 60);

  const timer = document.getElementById("timer");
  const msg = document.getElementById("mensagem");
  const btn = document.getElementById("btn");

  timer.innerHTML = aberto
    ? `O portal fecha em ${minutos}:${segundos.toString().padStart(2,'0')}`
    : `O portal pode abrir em ${minutos}:${segundos.toString().padStart(2,'0')}`;

  if (aberto) {
    msg.innerHTML = "O portal está aberto...";
    btn.style.opacity = 1;
  } else {
    msg.innerHTML = "Volte em breve... o portal ainda não abriu.";
    btn.style.opacity = 0;
  }

  // efeito glitch quando faltam 10s
  if (restante < 10000) {
    msg.classList.add("glitch");
    timer.classList.add("glitch");
  } else {
    msg.classList.remove("glitch");
    timer.classList.remove("glitch");
  }
}

function entrar() {
  window.location.href = "home.html";
}

// atualiza a cada segundo
setInterval(atualizar, 1000);

// primeira execução imediata
atualizar();
</script>

</body>
</html>
